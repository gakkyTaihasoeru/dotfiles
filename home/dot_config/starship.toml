add_newline = true
command_timeout = 500

format = """
$hostname\
$directory\
$git_branch$git_state$git_status$git_metrics\
$kubernetes$terraform$aws\
$python$nodejs$golang$rust\
$jobs$status\
$line_break$character"""

right_format = "$cmd_duration$time"

palette = "catppuccin_mocha"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold lavender)"

[hostname]
ssh_only = true
style = "bold subtext0"
format = "[$hostname]($style) "

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "…/"
read_only = " "
read_only_style = "bold peach"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold peach"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "⚠"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[git_state]
style = "bold flamingo"
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "

[kubernetes]
disabled = false
symbol = "󱃾 "
style = "bold sapphire"
format = "[$symbol$context( ($namespace))]($style) "
detect_files = ["kustomization.yaml", "kustomization.yml", "Chart.yaml", "skaffold.yaml", "kubeconfig"]
detect_folders = ["k8s", "kustomize"]
detect_extensions = []

[aws]
disabled = false
symbol = " "
style = "bold yellow"
force_display = false
format = "[$symbol$profile( ($region))]($style) "

[terraform]
disabled = false
symbol = "󱁢 "
style = "bold lavender"
format = "[$symbol$workspace]($style) "

[python]
symbol = " "
style = "bold yellow"
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold teal"
format = "via [$symbol($version )]($style)"

[rust]
symbol = " "
style = "bold maroon"
format = "via [$symbol($version )]($style)"

[jobs]
symbol = " "
style = "bold lavender"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

[status]
disabled = false
symbol = "✘ "
not_executable_symbol = "🚫 "
not_found_symbol = "🔍 "
sigint_symbol = "🧱 "
signal_symbol = "⚡ "
success_symbol = ""
format = "[$symbol$common_meaning$signal_name$maybe_int]($style) "
style = "bold red"

[cmd_duration]
min_time = 500
style = "subtext0"
format = "[${duration}]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "subtext1"
format = "[$time]($style) "

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
