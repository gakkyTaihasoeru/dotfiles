name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./bin
          severity: warning

  shell-syntax:
    name: Shell Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: |
          set -e
          find ./bin -type f -name '*.sh' | while read -r f; do
            echo "→ $f"
            if bash -n "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

  install-dry-run:
    name: Install Dry Run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate install flow with dry-run
        run: bash ./bin/install.sh --dry-run --skip-brew --skip-mise --skip-macos

  lint:
    name: Lint (JSON / TOML / YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          set -e
          find . -name '*.json' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_json.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate TOML
        run: |
          set -e
          find . -name '*.toml' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_toml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate YAML
        run: |
          set -e
          python3 -m pip install --quiet pyyaml
          find . \( -name '*.yml' -o -name '*.yaml' \) -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_yaml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done
