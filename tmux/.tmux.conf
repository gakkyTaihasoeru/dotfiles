# Ghostty + tmux defaults tuned for daily terminal work.

set -g default-terminal "tmux-256color"
# Ghostty outside tmux
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:clipboard"
set -g focus-events on

set -g mouse on
set -g history-limit 200000
# Clipboard
set -s set-clipboard on
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

set -g escape-time 0
set -g repeat-time 300
set -g allow-rename off
setw -g automatic-rename off
set -g status-keys vi
setw -g aggressive-resize on

setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour45"

set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=colour250"
set -g status-left-length 32
set -g status-right-length 80
set -g status-left "#[fg=colour45,bold]#S "
set -g status-right "#[fg=colour245]%Y-%m-%d #[fg=colour252]%H:%M "

setw -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format "#[fg=colour45,bold] #I:#W#{?window_flags,#{window_flags}, } #[default]"
setw -g window-status-activity-style "fg=colour215,none"

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "tmux new-session -A -s scratch"

bind -r ( switch-client -p
bind -r ) switch-client -n
bind X confirm-before -p "kill-session #S? (y/n)" kill-session
bind C-b send-prefix
