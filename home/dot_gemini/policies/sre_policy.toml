  "kubectl api-versions",
  "kubectl version",
  "kubectl config current-context",
  "kubectl config get-contexts",
  "kubectl config view",
]
decision = "allow"
priority = 10

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "helm list",
  "helm status",
  "helm get",
  "helm history",
  "helm show",
  "helm version",
  "helm template",
