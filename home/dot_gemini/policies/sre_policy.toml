  "aws ec2 describe-",
  "aws logs describe-",
  "aws logs tail",
  "aws logs filter-log-events",
  "aws cloudwatch describe-",
  "aws cloudwatch get-metric-",
  "aws iam list-",
  "aws iam get-",
]
decision = "allow"
priority = 10

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "gcloud auth list",
