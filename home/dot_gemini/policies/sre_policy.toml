  "gcloud projects list",
  "gcloud compute instances list",
  "gcloud compute instances describe",
  "gcloud logging read",
]
decision = "allow"
priority = 10

# Network / process / disk inspection
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "dig",
  "nslookup",
  "host ",
  "ping -c",
  "traceroute",
  "curl -I",
  "curl -sS",
  "curl -fsSL",
  "ss",
  "netstat",
  "ps",
  "top -b",
  "df",
  "du",
  "free",
  "uname",
  "uptime",
  "whoami",
  "date",
  "pwd",
  "ls",
  "wc",
  "sort",
  "uniq",
  "awk",
  "sed -n",
  "grep",
  "rg",
  "find",
  "file ",
  "stat",
  "env",
  "which",
  "type ",
  "jq",
  "yq",
]
decision = "allow"
priority = 10

# ------------------------------------------------------------
# File edit restrictions
# 編集許可パスのホワイトリスト（絶対パス/相対パスどちらにもマッチ）
# argsPattern は tool args の JSON 文字列に対する正規表現
# ------------------------------------------------------------
[[rule]]
toolName = ["write_file", "replace"]
argsPattern = '"file_path":"[^"]*/(docs|runbooks|terraform|helm|k8s|kubernetes|manifests|scripts|monitoring|dashboards|alerts)/'
decision = "allow"
priority = 60

[[rule]]
toolName = ["write_file", "replace"]
argsPattern = '"file_path":"[^"]*/\.github/workflows/'
decision = "allow"
priority = 60

# それ以外のファイル編集はデフォルトで ask_user
[[rule]]
toolName = ["write_file", "replace"]
decision = "ask_user"
priority = 40
