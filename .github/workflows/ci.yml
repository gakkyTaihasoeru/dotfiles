name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./bin
          severity: warning

  shell-syntax:
    name: Shell Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate shell scripts
        run: |
          set -e
          find ./bin -type f -name '*.sh' | while read -r f; do
            echo "→ $f"
            if bash -n "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shfmt
        run: |
          version=$(curl -fsSL https://api.github.com/repos/mvdan/sh/releases/latest \
            | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "shfmt version: $version"
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${version}/shfmt_${version}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt
          shfmt --version
      - name: Check shell formatting
        run: shfmt -d -i 2 -ci -bn ./bin ./home/dot_claude/executable_statusline.sh

  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compile Python sources
        run: |
          set -e
          find ./scripts ./home/dot_claude/hooks ./.codex/hooks -type f -name '*.py' -print0 \
            | xargs -0 python3 -m py_compile

  chezmoi-dry-run:
    name: Chezmoi Dry Run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install chezmoi
        run: brew install chezmoi
      - name: Validate chezmoi apply against an empty home
        run: |
          tmp_home="$(mktemp -d)"
          chezmoi apply --dry-run --verbose \
            --source "${GITHUB_WORKSPACE}/home" \
            --destination "$tmp_home"

  lint:
    name: Lint (JSON / TOML / YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate JSON
        run: |
          set -e
          find . -name '*.json' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_json.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate TOML
        run: |
          set -e
          find . -name '*.toml' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_toml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate YAML
        run: |
          set -e
          python3 -m pip install --quiet pyyaml
          find . \( -name '*.yml' -o -name '*.yaml' \) -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_yaml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done
