# SRE Policy for Gemini CLI
# priority: 0-999 (tier base: User tier = 4)
# See https://geminicli.com/docs/core/policy-engine

# ------------------------------------------------------------
# DENY (priority 100): 破壊・不可逆・ホスト停止
# ------------------------------------------------------------
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "rm -rf /",
  "rm -rf ~",
  "rm -rf $HOME",
  "dd ",
  "dd if=",
  "mkfs",
  "shutdown",
  "reboot",
  "halt",
  "poweroff",
  "chmod -R 777 /",
  "chown -R root /",
]
decision = "deny"
priority = 100
denyMessage = "ホスト停止・不可逆な破壊操作は禁止されています。"

# Git: 公開 / 履歴破壊系
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "git push --force",
  "git push -f",
  "git reset --hard origin/main",
  "git reset --hard origin/master",
  "git clean -fdx",
  "git filter-branch",
]
decision = "deny"
priority = 100
denyMessage = "履歴破壊・force push は禁止。必要なら明示的に承認を取ってから手動で。"

# Terraform: state 破壊
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "terraform destroy",
  "terraform force-unlock",
  "terraform state rm",
  "terraform state mv",
  "terraform state push",
  "terraform workspace delete",
]
decision = "deny"
priority = 100
denyMessage = "terraform state を不可逆に変更する操作は禁止。"

# Kubernetes / Helm: cluster 破壊
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "kubectl delete ns",
  "kubectl delete namespace",
  "kubectl drain",
  "kubectl taint",
  "helm uninstall",
]
decision = "deny"
priority = 100
denyMessage = "cluster スコープの破壊的操作は禁止。"

# Docker: 環境ワイプ
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "docker system prune",
  "docker volume prune",
  "docker network prune",
]
decision = "deny"
priority = 100

# ------------------------------------------------------------
# ASK_USER (priority 50): 副作用あり・要確認
# ------------------------------------------------------------
[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "git add",
  "git commit",
  "git push",
  "git pull",
  "git fetch",
  "git checkout",
  "git switch",
  "git merge",
  "git rebase",
  "git cherry-pick",
  "git revert",
  "git stash",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "kubectl apply",
  "kubectl delete",
  "kubectl patch",
  "kubectl edit",
  "kubectl scale",
  "kubectl rollout",
  "kubectl cordon",
  "kubectl uncordon",
  "kubectl label",
  "kubectl annotate",
  "kubectl port-forward",
  "kubectl exec",
  "kubectl cp",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "helm upgrade",
  "helm install",
  "helm rollback",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "terraform apply",
  "terraform init",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "docker build",
  "docker run",
  "docker exec",
  "docker stop",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "aws s3 cp",
  "aws s3 sync",
  "aws s3 rm",
]
decision = "ask_user"
priority = 50

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "curl -X POST",
  "curl -X PUT",
  "curl -X DELETE",
  "curl -X PATCH",
]
decision = "ask_user"
priority = 50

# ------------------------------------------------------------
