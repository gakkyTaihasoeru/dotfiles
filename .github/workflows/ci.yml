name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./bin
          severity: warning

  shell-syntax:
    name: Shell Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: |
          set -e
          find ./bin -type f -name '*.sh' | while read -r f; do
            echo "→ $f"
            if bash -n "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.11.0_linux_amd64
          chmod +x /usr/local/bin/shfmt
      - name: Check shell formatting
        run: shfmt -d -i 2 -ci -bn ./bin ./claude/statusline.sh

  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile Python sources
        run: |
          set -e
          find ./scripts ./claude/hooks ./.codex/hooks -type f -name '*.py' -print0 \
            | xargs -0 python3 -m py_compile

  install-dry-run:
    name: Install Dry Run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate install flow with dry-run
        run: bash ./bin/install.sh --dry-run --skip-brew --skip-mise --skip-macos

  lint:
    name: Lint (JSON / TOML / YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          set -e
          find . -name '*.json' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_json.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate TOML
        run: |
          set -e
          find . -name '*.toml' -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_toml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done

      - name: Validate YAML
        run: |
          set -e
          python3 -m pip install --quiet pyyaml
          find . \( -name '*.yml' -o -name '*.yaml' \) -not -path './.git/*' -not -path './node_modules/*' | while read -r f; do
            echo "→ $f"
            if python3 ./scripts/validate_yaml.py "$f"; then
              echo "  ✓ OK"
            else
              echo "  ✗ FAILED"
              exit 1
            fi
          done
